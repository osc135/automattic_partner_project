[phases.setup]
nixPkgs = ["nodejs_18", "python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd backend && python3 -m pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "mkdir -p backend/static",
  "cp -r frontend/dist/* backend/static/"
]

[start]
cmd = "cd backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
